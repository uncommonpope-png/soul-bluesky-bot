name: Post to Bluesky

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq librsvg2-bin
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh && ollama pull llama3.2:1b
      - run: node post.js
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_INSTANCE_2: ${{ secrets.MASTODON_INSTANCE_2 }}
          MASTODON_ACCESS_TOKEN_2: ${{ secrets.MASTODON_ACCESS_TOKEN_2 }}
          OLLAMA_URL: http://127.0.0.1:11434
          OLLAMA_MODEL: llama3.2:1b
